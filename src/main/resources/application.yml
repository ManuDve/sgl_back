spring:
  application:
    name: sgl_backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sgl_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: disabled
    filter:
      order: 5

# Habilitar Spring Security
security:
  enable: true

jwt:
  secret: ${JWT_SECRET:dev-local-secret-change-me-32bytes}
  expiration-hours: 8

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  cors:
    # Origen permitido. En producción, sobreescribir con variable de entorno ALLOWED_ORIGIN.
    allowed-origin: ${ALLOWED_ORIGIN:http://localhost:4321}

mailtrap:
  api:
    token: ${MAILTRAP_API_TOKEN:}
    from-email: ${MAILTRAP_FROM_EMAIL:no-reply@manudavid.cl}

server:
  port: 8080
