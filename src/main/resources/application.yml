spring:
  application:
    name: sgl_backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sgl_db}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    user:
      name: admin
      password: disabled
    filter:
      order: 5

# Habilitar Spring Security
security:
  enable: true

jwt:
  secret: ${JWT_SECRET:dev-local-secret-change-me-32bytes}
  expiration-hours: 8

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  cors:
    # Origen permitido. En producción, sobreescribir con variable de entorno ALLOWED_ORIGIN.
    allowed-origin: ${ALLOWED_ORIGIN:http://localhost:4321}

admin:
  email: ${ADMIN_EMAIL:}

reminder:
  first-lead-minutes:  ${REMINDER_FIRST_LEAD_MINUTES:1440}   # minutos antes del primer recordatorio (default: 24h exactas)
  second-lead-minutes: ${REMINDER_SECOND_LEAD_MINUTES:120}   # minutos antes del segundo recordatorio (default: 2h exactas)
  cron:                ${REMINDER_CRON:0 0 * * * *}           # cuándo ejecutar — default: inicio de cada hora en punto

mailtrap:
  api:
    token: ${MAILTRAP_API_TOKEN:}
    from-email: ${MAILTRAP_FROM_EMAIL:no-reply@manudavid.cl}

twilio:
  account-sid:          ${TWILIO_ACCOUNT_SID:}
  auth-token:           ${TWILIO_AUTH_TOKEN:}
  whatsapp-from:        ${TWILIO_WHATSAPP_FROM:}
  content-sid:          ${TWILIO_CONTENT_SID:}          # Content Template de agendamiento HX... (business-initiated)
  payment-content-sid:  ${TWILIO_PAYMENT_CONTENT_SID:}  # Content Template de confirmación de pago HX...

transbank:
  commerce-code:  ${TRANSBANK_COMMERCE_CODE:597055555532}
  api-key:        ${TRANSBANK_API_KEY:579B532A7440BB0C9079DED94D31EA1615BACEB56610332264630D42D0A36B1C}
  environment:    ${TRANSBANK_ENV:integration}
  return-url:     ${TRANSBANK_RETURN_URL:http://localhost:8080/api/webpay/commit}
  frontend-url:   ${TRANSBANK_FRONTEND_URL:http://localhost:4321}

server:
  port: 8080
